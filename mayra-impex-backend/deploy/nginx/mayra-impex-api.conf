# Hardened Nginx reverse proxy for Mayra Impex API

# Request rate zones (edge protection)
limit_req_zone $binary_remote_addr zone=api_global:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_strict:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=admin_write:10m rate=60r/m;

# Upstream Node.js backend
upstream mayra_api_upstream {
    server 127.0.0.1:5001;
    keepalive 64;
}

# Redirect HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.example.com;
    return 301 https://api.example.com$request_uri;
}

# HTTPS API
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.example.com;

    # TLS certs (Let's Encrypt or managed cert)
    ssl_certificate /etc/letsencrypt/live/api.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.example.com/privkey.pem;

    # TLS hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 1.0.0.1 valid=300s;
    resolver_timeout 5s;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Hide Nginx version
    server_tokens off;

    # Request limits
    client_max_body_size 10m;

    # Global API limiter
    limit_req zone=api_global burst=120 nodelay;

    # Proxy defaults
    proxy_http_version 1.1;
    proxy_set_header Host api.example.com;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    # Health endpoint
    location = /health {
        proxy_pass http://mayra_api_upstream/health;
    }

    # Stricter login/refresh limiting
    location ~ ^/api/auth/(login|refresh-token)$ {
        limit_req zone=auth_strict burst=20 nodelay;
        proxy_pass http://mayra_api_upstream;
    }

    # Stricter admin write routes (extra edge safety)
    location ~ ^/api/(products|categories|orders|inventory|banners|activity|notes) {
        if ($request_method ~* "(POST|PUT|PATCH|DELETE)") {
            limit_req zone=admin_write burst=30 nodelay;
        }
        proxy_pass http://mayra_api_upstream;
    }

    # Default API passthrough
    location / {
        proxy_pass http://mayra_api_upstream;
    }
}
